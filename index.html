<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PFO 2 - Prompt Engineering en Agentes de IA</title>
  <meta name="description" content="Portada de acceso y menu unificador para el proyecto PFO 2 de Prompt Engineering en Agentes de IA - IFTS N°29." />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0B0C10; --surface: #0f1117; --text: #C5C6C7; --text-dim: #6b7280;
      --cyan: #66FCF1; --cyan-dim: rgba(102,252,241,0.12); --cyan-glow: rgba(102,252,241,0.45);
      --border: rgba(102,252,241,0.2);
    }
    html, body { height: 100%; }
    body {
      background-color: var(--bg); color: var(--text);
      font-family: 'Space Grotesk','Roboto Mono',monospace;
      min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
    }
    .stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .stars span {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s); opacity: 0;
    }
    @keyframes twinkle {
      0%,100% { opacity:0; transform:scale(1); }
      50% { opacity:var(--op,0.6); transform:scale(1.3); }
    }
    body::after {
      content:''; position:fixed; inset:0; z-index:1;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
      pointer-events:none;
    }
    main {
      position:relative; z-index:2; flex:1;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:2rem 1.5rem; min-height:100vh;
    }
    .card {
      width:100%; max-width:760px;
      background:rgba(15,17,23,0.75);
      border:1px solid var(--border); border-radius:16px;
      padding:3rem 3.5rem; backdrop-filter:blur(18px);
      box-shadow:0 0 0 1px var(--border),0 0 40px rgba(102,252,241,0.06),0 32px 64px rgba(0,0,0,0.6);
      display:flex; flex-direction:column; align-items:center; gap:2.5rem;
    }
    .badge {
      display:inline-flex; align-items:center; gap:0.5rem;
      font-family:'Roboto Mono',monospace; font-size:0.7rem; font-weight:500;
      letter-spacing:0.18em; text-transform:uppercase; color:var(--cyan);
      border:1px solid var(--border); border-radius:999px;
      padding:0.35rem 1rem; background:var(--cyan-dim);
    }
    .badge::before {
      content:''; width:6px; height:6px; border-radius:50%;
      background:var(--cyan); box-shadow:0 0 8px var(--cyan);
      animation:pulse-dot 1.8s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; box-shadow:0 0 8px var(--cyan); }
      50% { opacity:0.4; box-shadow:0 0 2px var(--cyan); }
    }
    .title-area { text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; }
    h1 {
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(1.4rem,3.5vw,2rem); font-weight:700;
      line-height:1.25; letter-spacing:-0.01em; color:#fff;
      text-align:center; min-height:2.6em;
    }
    .cursor-blink {
      display:inline-block; width:2px; height:1em;
      background:var(--cyan); margin-left:3px; vertical-align:middle;
      box-shadow:0 0 8px var(--cyan); animation:blink 0.75s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    .subtitle { font-family:'Roboto Mono',monospace; font-size:0.78rem; color:var(--text-dim); letter-spacing:0.08em; }
    .divider { width:100%; height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); }
    .nav-buttons { display:flex; flex-direction:column; gap:1rem; width:100%; }
    .nav-btn {
      position:relative; display:flex; align-items:center; gap:1.2rem;
      width:100%; padding:1.1rem 1.6rem;
      background:rgba(102,252,241,0.04); border:1px solid var(--border); border-radius:10px;
      color:var(--text); text-decoration:none;
      font-family:'Space Grotesk',sans-serif; font-size:0.95rem; font-weight:500;
      letter-spacing:0.01em; cursor:pointer; overflow:hidden;
      transition:color .25s ease,border-color .25s ease,background .25s ease,box-shadow .25s ease,transform .2s ease;
    }
    .nav-btn::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,var(--cyan-dim),transparent);
      opacity:0; transition:opacity .3s ease;
    }
    .nav-btn:hover::before { opacity:1; }
    .nav-btn:hover {
      color:var(--cyan); border-color:var(--cyan);
      background:rgba(102,252,241,0.06);
      box-shadow:0 0 16px rgba(102,252,241,0.2),0 0 40px rgba(102,252,241,0.08),inset 0 0 12px rgba(102,252,241,0.04);
      transform:translateY(-2px);
    }
    .nav-btn:active { transform:translateY(0); }
    .btn-index {
      position:relative; z-index:1;
      font-family:'Roboto Mono',monospace; font-size:0.7rem; font-weight:500;
      color:var(--cyan); background:var(--cyan-dim); border:1px solid var(--border);
      border-radius:5px; padding:0.25rem 0.55rem; min-width:2.6rem;
      text-align:center; letter-spacing:0.05em; flex-shrink:0;
      transition:background .25s ease,box-shadow .25s ease;
    }
    .nav-btn:hover .btn-index { background:rgba(102,252,241,0.2); box-shadow:0 0 8px rgba(102,252,241,0.4); }
    .btn-label { position:relative; z-index:1; flex:1; }
    .btn-arrow {
      position:relative; z-index:1; font-size:1rem;
      opacity:0; transform:translateX(-6px);
      transition:opacity .25s ease,transform .25s ease; color:var(--cyan);
    }
    .nav-btn:hover .btn-arrow { opacity:1; transform:translateX(0); }
    footer {
      position:relative; z-index:2; text-align:center;
      padding:1.25rem 1rem 1.5rem;
      font-family:'Roboto Mono',monospace; font-size:0.7rem;
      color:var(--text-dim); letter-spacing:0.08em;
    }
    footer span { color:var(--cyan); opacity:0.7; }
    @media (max-width:560px) {
      .card { padding:2rem 1.5rem; gap:2rem; }
      h1 { font-size:1.25rem; }
      .nav-btn { font-size:0.85rem; padding:1rem 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <main>
    <div class="card">
      <div class="badge">Prompt Engineering &middot; IFTS N&#176;29</div>
      <div class="title-area">
        <h1 id="typewriter-title"><span id="tw-text"></span><span class="cursor-blink" id="tw-cursor"></span></h1>
        <p class="subtitle">// Selecciona un m&#243;dulo para continuar</p>
      </div>
      <div class="divider"></div>
      <nav class="nav-buttons" aria-label="M&#243;dulos del proyecto">
        <a href="prompt.txt" class="nav-btn" id="btn-1" target="_blank" rel="noopener">
          <span class="btn-index">01</span>
          <span class="btn-label">Link 1: Prompt Maestro Original</span>
          <span class="btn-arrow" aria-hidden="true">&#8594;</span>
        </a>
        <a href="cursor/index.html" class="nav-btn" id="btn-2">
          <span class="btn-index">02</span>
          <span class="btn-label">Link 2: Landing Page - Agente: Cursor (Claude 3.5 Sonnet)</span>
          <span class="btn-arrow" aria-hidden="true">&#8594;</span>
        </a>
        <a href="codex/index.html" class="nav-btn" id="btn-3">
          <span class="btn-index">03</span>
          <span class="btn-label">Link 3: Landing Page - Agente: Codex (OpenAI)</span>
          <span class="btn-arrow" aria-hidden="true">&#8594;</span>
        </a>
      </nav>
    </div>
  </main>
  <footer>
    <span>//</span> Desarrollado por: Lucio &mdash; IFTS N.&#176;29
  </footer>
  <script>
    (function(){
      var container=document.getElementById('stars');
      for(var i=0;i<120;i++){
        var s=document.createElement('span');
        var size=Math.random()*2+0.5;
        s.style.cssText='width:'+size+'px;height:'+size+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;--dur:'+(Math.random()*4+2).toFixed(1)+'s;--delay:'+(Math.random()*5).toFixed(1)+'s;--op:'+(Math.random()*0.5+0.2).toFixed(2);
        container.appendChild(s);
      }
    })();
    (function(){
      var fullText='PFO 2 - Prompt Engineering en Agentes de IA';
      var textEl=document.getElementById('tw-text');
      var cursorEl=document.getElementById('tw-cursor');
      var index=0;
      function type(){
        if(index<fullText.length){
          textEl.textContent+=fullText.charAt(index);
          index++;
          setTimeout(type,42+Math.random()*20);
        } else {
          setTimeout(function(){
            cursorEl.style.animation='none';
            cursorEl.style.opacity='0';
          },1200);
        }
      }
      setTimeout(type,400);
    })();
  </script>
</body>
</html>
